services:
  - type: web
    name: sahim-backend
    runtime: python
    region: frankfurt
    buildCommand: pip install -e ".[dev]"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    rootDir: backend
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: MUSAFFA_API_KEY
        sync: false
      - key: HALAL_SCREENER_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
